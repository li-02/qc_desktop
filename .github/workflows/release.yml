name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 提取版本号，供后续 job 使用
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            ext: AppImage
          - os: macos-latest
            target: mac
            ext: dmg
          - os: windows-latest
            target: win
            ext: exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version into package.json
        shell: bash
        run: node -e "const fs=require('fs');const p=require('./package.json');p.version='${{ needs.prepare.outputs.version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install R (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base

      - name: Install R (macOS)
        if: runner.os == 'macOS'
        run: brew install r

      - name: Install R (Windows)
        if: runner.os == 'Windows'
        run: |
          $rUrl = "https://cran.r-project.org/bin/windows/base/R-4.4.3-win.exe"
          $rInstaller = "$env:TEMP\R-install.exe"
          Invoke-WebRequest -Uri $rUrl -OutFile $rInstaller
          Start-Process -FilePath $rInstaller -ArgumentList "/VERYSILENT /DIR=C:\R" -Wait
          echo "C:\R\bin\x64" >> $env:GITHUB_PATH

      - name: Install Python dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Install Node.js dependencies (root)
        run: pnpm install

      - name: Install Node.js dependencies (frontend)
        run: pnpm --dir frontend install

      - name: Build
        run: pnpm run build

      - name: Package with electron-builder
        run: npx electron-builder --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            release/*.${{ matrix.ext }}
            release/*.yml
            release/*.blockmap

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.prepare.outputs.version }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
