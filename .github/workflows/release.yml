name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 提取版本号，供后续 job 使用
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            ext: AppImage
          - os: macos-latest
            target: mac
            ext: dmg
          - os: windows-latest
            target: win
            ext: exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version into package.json
        shell: bash
        run: node -e "const fs=require('fs');const p=require('./package.json');p.version='${{ needs.prepare.outputs.version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'

      - name: Install Python dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Install Node.js dependencies (root)
        run: pnpm install

      - name: Install Node.js dependencies (frontend)
        run: pnpm --dir frontend install

      - name: Build
        run: pnpm run build

      - name: Package with electron-builder
        run: npx electron-builder --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            release/*.${{ matrix.ext }}
            release/*.yml
            release/*.blockmap

  release:
    needs: [prepare, build]
    if: always() && needs.build.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.prepare.outputs.version }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
