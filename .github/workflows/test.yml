name: Test

on:
  workflow_dispatch:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install

      - name: Run frontend tests
        run: pnpm --dir frontend exec vitest run --coverage

      - name: Upload frontend coverage and logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            frontend/coverage
            frontend/test-results
            frontend/*.log
          if-no-files-found: ignore

  electron-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install

      - name: Run Electron main-process tests
        run: pnpm exec jest --config electron/jest.config.js --coverage --passWithNoTests

      - name: Upload Electron coverage and logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-test-artifacts
          path: |
            coverage
            jest*.log
            npm-debug.log*
            pnpm-debug.log*
          if-no-files-found: ignore

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt pytest pytest-cov

      - name: Run Python tests
        run: pytest python/tests --cov=python --cov-report=xml --cov-report=term-missing

      - name: Upload Python coverage and logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-artifacts
          path: |
            coverage.xml
            .pytest_cache
            python/**/*.log
          if-no-files-found: ignore
